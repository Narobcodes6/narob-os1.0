name: NarobOS ISO Pipeline

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            grub-pc-bin \
            grub-efi-amd64-bin \
            squashfs-tools \
            xorriso \
            dosfstools \
            mtools \
            dos2unix

      - name: Create build environment
        run: |
          mkdir -p iso-build/auto
          mkdir -p iso-build/config/package-lists

          # Create config script
          cat << 'EOF' > iso-build/auto/config
          #!/bin/sh
          set -e

          lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --archive-areas "main contrib non-free non-free-firmware" \
            --debian-installer none \
            --bootloader grub-efi \
            --apt-recommends false
          EOF

          # Fix permissions + line endings (prevents exit 126)
          chmod 755 iso-build/auto/config
          dos2unix iso-build/auto/config

          # Minimal package list
          cat << 'EOF' > iso-build/config/package-lists/base.list.chroot
          systemd
          systemd-sysv
          bash
          sudo
          apt
          ca-certificates
          debian-archive-keyring
          EOF

      - name: Configure live-build
        run: |
          cd iso-build
          ls -l auto   # debug visibility
          sudo ./auto/config

      - name: Build ISO
        run: |
          cd iso-build
          sudo lb clean
          sudo lb build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: iso-build/*.iso
