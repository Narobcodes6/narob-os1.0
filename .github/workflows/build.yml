name: NarobOS ISO Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build debootstrap \
            grub-pc-bin grub-efi-amd64-bin \
            squashfs-tools xorriso \
            dosfstools mtools

      - name: Setup config
        run: |
          mkdir -p build/config/package-lists

          # Create package list FIRST
          cat << 'EOF' > build/config/package-lists/base.list.chroot
          systemd
          systemd-sysv
          bash
          sudo
          apt
          ca-certificates
          debian-archive-keyring
          EOF

          cd build

          # THEN run config
          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --archive-areas "main contrib non-free non-free-firmware" \
            --debian-installer none \
            --bootloader grub-efi \
            --apt-recommends false

      - name: Build ISO
        run: |
          cd build
          sudo lb clean
          sudo lb build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: build/*.iso
