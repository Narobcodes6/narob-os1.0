name: NarobOS ISO Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build debootstrap \
            grub-pc-bin grub-efi-amd64-bin \
            squashfs-tools xorriso \
            dosfstools mtools

      - name: Prepare build config
        run: |
          mkdir -p build/config/package-lists

          # Proper base system (required for ISO)
          cat << 'EOF' > build/config/package-lists/base.list.chroot
          systemd
          systemd-sysv
          bash
          sudo
          apt
          ca-certificates
          debian-archive-keyring
          live-boot
          live-config
          EOF

          cd build

          # IMPORTANT: enable live system
          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --system live \
            --archive-areas "main" \
            --debian-installer none \
            --apt-recommends false

      - name: Build ISO
        run: |
          cd build
          sudo lb clean
          sudo lb build 2>&1 | tee ../build.log

      - name: Check output
        run: |
          ls -lah build || true

      - name: Upload ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: build/*.iso

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
