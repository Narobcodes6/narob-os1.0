name: NarobOS ISO Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-iso:
    name: Build Live ISO
    runs-on: ubuntu-latest
    timeout-minutes: 100

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Install Required Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            grub-efi-amd64-bin \
            grub-pc-bin \
            squashfs-tools \
            xorriso \
            dosfstools \
            mtools

      - name: Set Up Build Directory
        run: |
          mkdir -p iso-build
          cd iso-build

          mkdir -p auto config/package-lists

          cat << 'EOF' > auto/config
          #!/bin/sh
          set -e

          lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --archive-areas "main contrib non-free non-free-firmware" \
            --bootloader grub-efi \
            --debian-installer none \
            --apt-recommends false \
            --iso-volume "NarobOS"
          EOF

          chmod +x auto/config

          cat << 'EOF' > config/package-lists/system.list.chroot
          systemd
          systemd-sysv
          bash
          sudo
          apt
          ca-certificates
          debian-archive-keyring
          EOF

      - name: Configure Build
        run: |
          cd iso-build
          sudo ./auto/config

      - name: Execute Build
        run: |
          cd iso-build
          sudo lb clean
          sudo lb build

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: iso-build/*.iso
