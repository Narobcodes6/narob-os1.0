name: Build NarobOS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build debootstrap curl gnupg xorriso \
            isolinux syslinux-utils squashfs-tools \
            grub-efi-amd64-bin grub-pc-bin mtools rsync

      - name: Create full NarobOS project from scratch
        run: |
          mkdir -p narobos/auto/hooks/live
          mkdir -p narobos/auto/packages
          mkdir -p narobos/config/includes.chroot/etc/narobos
          mkdir -p narobos/config/package-lists

          # ---- auto/config ----
          cat > narobos/auto/config << 'EOF'
          #!/bin/sh
          set -e
          lb config noauto \
            --system live \
            --distribution bookworm \
            --debian-installer none \
            --archive-areas "main contrib non-free non-free-firmware" \
            --apt-recommends false \
            --binary-images iso-hybrid \
            --bootloader grub-efi \
            --uefi-secure-boot disable \
            --memtest none \
            --iso-application "NarobOS" \
            --iso-publisher "NarobOS Project" \
            --iso-volume "NarobOS 1.0" \
            --image-name "narobos-1.0-amd64" \
            --linux-flavours amd64 \
            --firmware-binary true \
            --firmware-chroot true \
            --mirror-bootstrap "http://deb.debian.org/debian/" \
            --mirror-chroot "http://deb.debian.org/debian/" \
            "${@}"
          EOF

          # ---- base packages ----
          cat > narobos/config/package-lists/base.list.chroot << 'EOF'
          systemd
          systemd-sysv
          dbus
          udev
          sudo
          bash
          coreutils
          util-linux
          procps
          curl
          wget
          ca-certificates
          gnupg
          apt-transport-https
          firmware-linux
          firmware-linux-nonfree
          firmware-amd-graphics
          firmware-iwlwifi
          firmware-realtek
          mesa-vulkan-drivers
          mesa-va-drivers
          libvulkan1
          libgl1-mesa-dri
          pipewire
          pipewire-pulse
          pipewire-alsa
          wireplumber
          alsa-utils
          network-manager
          wpasupplicant
          fonts-dejavu-core
          fonts-liberation
          libinput-tools
          ntfs-3g
          htop
          pciutils
          usbutils
          EOF

          # ---- gaming packages ----
          cat > narobos/config/package-lists/gaming.list.chroot << 'EOF'
          gamemode
          mangohud
          ffmpeg
          libavcodec-extra
          EOF

          # ---- repo hook ----
          cat > narobos/auto/hooks/live/0010-add-repos.hook.chroot << 'EOF'
          #!/bin/bash
          set -e
          dpkg --add-architecture i386
          curl -fsSL https://repo.steampowered.com/steam/archive/precise/steam.gpg \
            -o /usr/share/keyrings/steam.gpg
          cat > /etc/apt/sources.list.d/steam.list << REPO
          deb [arch=amd64,i386 signed-by=/usr/share/keyrings/steam.gpg] https://repo.steampowered.com/steam/ stable steam
          REPO
          apt-get update
          EOF

          # ---- gaming tweaks hook ----
          cat > narobos/auto/hooks/live/0030-gaming-tweaks.hook.chroot << 'EOF'
          #!/bin/bash
          set -e
          cat > /etc/sysctl.d/99-narobos-gaming.conf << SYSCTL
          vm.swappiness=10
          vm.dirty_ratio=10
          fs.inotify.max_user_watches=524288
          SYSCTL

          mkdir -p /etc/skel/.config/MangoHud
          cat > /etc/skel/.config/MangoHud/MangoHud.conf << MANGO
          fps
          frametime
          cpu_stats
          gpu_stats
          gpu_temp
          cpu_temp
          ram
          vram
          position=top-left
          font_size=20
          toggle_hud=F12
          MANGO
          EOF

          # ---- os-release ----
          cat > narobos/config/includes.chroot/etc/narobos/os-release << 'EOF'
          NAME="NarobOS"
          VERSION="1.0"
          ID=narobos
          ID_LIKE=debian
          PRETTY_NAME="NarobOS 1.0"
          VERSION_ID="1.0"
          EOF

          chmod +x narobos/auto/config
          chmod +x narobos/auto/hooks/live/*.hook.chroot
          echo "Project structure created:"
          find narobos -type f

      - name: Configure live-build
        working-directory: narobos
        run: sudo bash auto/config

      - name: Build ISO
        working-directory: narobos
        run: sudo lb build 2>&1 | tee ../build.log

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: "narobos/*.iso"
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
