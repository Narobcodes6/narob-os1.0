name: NarobOS ISO Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build debootstrap \
            grub-pc-bin grub-efi-amd64-bin \
            squashfs-tools xorriso \
            dosfstools mtools

      - name: Prepare build config
        run: |
          mkdir -p build/config/package-lists

          # MINIMAL packages (nothing that can break)
          cat << 'EOF' > build/config/package-lists/base.list.chroot
          apt
          debian-archive-keyring
          ca-certificates
          EOF

          cd build

          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --archive-areas "main" \
            --debian-installer none \
            --apt-recommends false

      - name: Build ISO (debug mode)
        run: |
          cd build
          sudo lb clean

          # FORCE full logs
          sudo lb build 2>&1 | tee ../full-build.log

      - name: Show errors if failed
        if: failure()
        run: |
          echo "==== LAST 200 LINES OF LOG ===="
          tail -n 200 full-build.log || true

      - name: Upload ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: build/*.iso

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: full-build.log
