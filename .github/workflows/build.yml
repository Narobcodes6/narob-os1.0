name: Build NarobOS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin mtools dosfstools curl

      - name: Bootstrap Debian base (minimal)
        run: |
          # Bootstrap with ONLY the bare minimum first
          sudo debootstrap \
            --arch=amd64 \
            --variant=minbase \
            --components=main,contrib,non-free,non-free-firmware \
            bookworm \
            /mnt/narobos \
            http://deb.debian.org/debian

      - name: Block service startup inside chroot
        run: |
          # Prevent any services from starting during package install
          sudo tee /mnt/narobos/usr/sbin/policy-rc.d << 'EOF'
          #!/bin/sh
          exit 101
          EOF
          sudo chmod +x /mnt/narobos/usr/sbin/policy-rc.d

          # Also fake systemctl so it does nothing
          sudo tee /mnt/narobos/usr/local/bin/systemctl << 'EOF'
          #!/bin/sh
          exit 0
          EOF
          sudo chmod +x /mnt/narobos/usr/local/bin/systemctl

      - name: Install packages inside chroot
        run: |
          # Mount needed filesystems
          sudo mount --bind /proc /mnt/narobos/proc
          sudo mount --bind /sys /mnt/narobos/sys
          sudo mount --bind /dev /mnt/narobos/dev
          sudo mount --bind /dev/pts /mnt/narobos/dev/pts

          # Fix sources
          sudo tee /mnt/narobos/etc/apt/sources.list << 'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF

          # Install everything in one chroot session
          sudo chroot /mnt/narobos /bin/bash << 'CHROOT'
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq

          # Core system
          apt-get install -y --no-install-recommends \
            systemd systemd-sysv dbus udev sudo \
            bash coreutils util-linux procps \
            curl wget ca-certificates gnupg \
            pciutils usbutils htop \
            network-manager wpasupplicant

          # Firmware
          apt-get install -y --no-install-recommends \
            firmware-linux firmware-linux-nonfree \
            firmware-amd-graphics firmware-iwlwifi firmware-realtek

          # GPU / display
          apt-get install -y --no-install-recommends \
            mesa-vulkan-drivers libvulkan1 libgl1-mesa-dri \
            xorg xserver-xorg xserver-xorg-input-libinput

          # XFCE desktop
          apt-get install -y --no-install-recommends \
            xfce4 xfce4-terminal lightdm lightdm-gtk-greeter \
            thunar zenity

          # Audio
          apt-get install -y --no-install-recommends \
            pipewire pipewire-pulse pipewire-alsa wireplumber alsa-utils

          # Tools
          apt-get install -y --no-install-recommends \
            synaptic gdebi parted fonts-dejavu-core

          # Clean up
          apt-get clean
          rm -rf /var/lib/apt/lists/*
          CHROOT

          # Unmount
          sudo umount /mnt/narobos/dev/pts || true
          sudo umount /mnt/narobos/dev || true
          sudo umount /mnt/narobos/proc || true
          sudo umount /mnt/narobos/sys || true

      - name: Configure the system
        run: |
          sudo tee /mnt/narobos/etc/os-release << 'EOF'
          NAME="NarobOS"
          VERSION="1.0"
          ID=narobos
          ID_LIKE=debian
          PRETTY_NAME="NarobOS 1.0"
          VERSION_ID="1.0"
          EOF

          echo "narobos" | sudo tee /mnt/narobos/etc/hostname

          sudo chroot /mnt/narobos useradd -m -s /bin/bash -G sudo,audio,video,plugdev narobos || true
          echo "narobos:narobos" | sudo chroot /mnt/narobos chpasswd
          echo "narobos ALL=(ALL) NOPASSWD:ALL" | sudo tee /mnt/narobos/etc/sudoers.d/narobos

          sudo mkdir -p /mnt/narobos/etc/lightdm
          sudo tee /mnt/narobos/etc/lightdm/lightdm.conf << 'EOF'
          [Seat:*]
          autologin-user=narobos
          autologin-user-timeout=0
          user-session=xfce
          EOF

          sudo tee /mnt/narobos/etc/sysctl.d/99-narobos.conf << 'EOF'
          vm.swappiness=10
          fs.inotify.max_user_watches=524288
          EOF

          sudo mkdir -p /mnt/narobos/etc/skel/.config/MangoHud
          sudo tee /mnt/narobos/etc/skel/.config/MangoHud/MangoHud.conf << 'EOF'
          fps
          cpu_stats
          gpu_stats
          gpu_temp
          cpu_temp
          ram
          position=top-left
          font_size=20
          toggle_hud=F12
          EOF

          sudo tee /mnt/narobos/usr/share/applications/narobos-install.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Install NarobOS
          Exec=bash -c 'sudo calamares'
          Icon=system-software-install
          Terminal=false
          Categories=System;
          EOF

          sudo tee /mnt/narobos/usr/local/bin/narobos-drivers << 'EOF'
          #!/bin/bash
          GPU=$(lspci | grep -iE 'vga|3d|display')
          if echo "$GPU" | grep -qi nvidia; then apt-get install -y nvidia-driver; fi
          if echo "$GPU" | grep -qi amd; then apt-get install -y firmware-amd-graphics mesa-vulkan-drivers; fi
          if echo "$GPU" | grep -qi intel; then apt-get install -y intel-media-va-driver mesa-vulkan-drivers; fi
          WIFI=$(lspci | grep -i network)
          if echo "$WIFI" | grep -qi intel; then apt-get install -y firmware-iwlwifi; fi
          if echo "$WIFI" | grep -qi realtek; then apt-get install -y firmware-realtek; fi
          EOF
          sudo chmod +x /mnt/narobos/usr/local/bin/narobos-drivers

          # Remove the fake systemctl now that install is done
          sudo rm -f /mnt/narobos/usr/local/bin/systemctl

      - name: Build squashfs and ISO
        run: |
          sudo mkdir -p /mnt/iso/{live,boot/grub}

          echo "Building squashfs..."
          sudo mksquashfs /mnt/narobos /mnt/iso/live/filesystem.squashfs \
            -comp xz \
            -e /mnt/narobos/proc \
            -e /mnt/narobos/sys \
            -e /mnt/narobos/dev

          echo "Copying kernel and initrd..."
          sudo cp $(ls /mnt/narobos/boot/vmlinuz-* | tail -1) /mnt/iso/boot/vmlinuz
          sudo cp $(ls /mnt/narobos/boot/initrd.img-* | tail -1) /mnt/iso/boot/initrd.img

          sudo tee /mnt/iso/boot/grub/grub.cfg << 'EOF'
          set default=0
          set timeout=3

          menuentry "NarobOS 1.0 (Live)" {
            linux /boot/vmlinuz boot=live quiet splash
            initrd /boot/initrd.img
          }

          menuentry "NarobOS 1.0 (Safe Mode)" {
            linux /boot/vmlinuz boot=live nomodeset
            initrd /boot/initrd.img
          }
          EOF

          echo "Building ISO..."
          sudo grub-mkrescue -o /tmp/narobos-1.0-amd64.iso /mnt/iso 2>&1
          sudo chown runner:runner /tmp/narobos-1.0-amd64.iso
          ls -lah /tmp/narobos-1.0-amd64.iso
          echo "ISO ready!"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: /tmp/narobos-1.0-amd64.iso
          retention-days: 14
