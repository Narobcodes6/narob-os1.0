name: NarobOS ISO Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build debootstrap \
            grub-pc-bin grub-efi-amd64-bin \
            squashfs-tools xorriso \
            dosfstools mtools

      - name: Prepare config
        run: |
          mkdir -p build/config/package-lists
          mkdir -p build/config/includes.chroot/etc

          # DNS fix
          echo "nameserver 8.8.8.8" > build/config/includes.chroot/etc/resolv.conf

          # Required packages
          cat << 'EOF' > build/config/package-lists/base.list.chroot
          systemd
          systemd-sysv
          bash
          sudo
          apt
          ca-certificates
          debian-archive-keyring
          live-boot
          live-config
          EOF

          cd build

          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --system live \
            --bootloader grub-pc \
            --archive-areas "main" \
            --debian-installer none \
            --build-with-chroot true

      - name: Build ISO
        run: |
          cd build

          sudo lb clean
          sudo lb build

          echo "==== OUTPUT ===="
          ls -lah

          echo "==== ISO SEARCH ===="
          find . -name "*.iso" || true

          if ! find . -name "*.iso" | grep -q .; then
            echo "❌ ISO NOT CREATED"
            exit 1
          fi

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: build/**/*.iso
