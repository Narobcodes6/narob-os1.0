name: NarobOS ISO Builder

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build debootstrap \
            grub-pc-bin \
            squashfs-tools xorriso \
            mtools

      - name: Setup config
        run: |
          mkdir -p build/config/package-lists
          mkdir -p build/config/hooks/normal

          # Minimal working system
          cat << 'EOF' > build/config/package-lists/base.list.chroot
          systemd-sysv
          bash
          apt
          ca-certificates
          debian-archive-keyring
          live-boot
          live-config
          EOF

          # 🔥 CRITICAL FIX: bind host DNS (this is what actually fixes exit 100)
          cat << 'EOF' > build/config/hooks/normal/00-fix-dns.hook.chroot
          #!/bin/bash
          set -e
          mount --bind /etc/resolv.conf /etc/resolv.conf || true
          EOF

          chmod +x build/config/hooks/normal/00-fix-dns.hook.chroot

          cd build

          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --system live \
            --bootloader grub-pc \
            --archive-areas "main" \
            --debian-installer none \
            --apt-options "--yes -o Acquire::Retries=3"

      - name: Build ISO
        run: |
          cd build
          sudo lb clean

          # capture logs
          sudo lb build > ../build.log 2>&1 || true

          echo "==== LAST 150 LOG LINES ===="
          tail -n 150 ../build.log || true

          echo "==== FILES ===="
          find . -maxdepth 2

          # fail if ISO missing
          if ! find . -name "*.iso" | grep -q .; then
            echo "❌ ISO NOT CREATED"
            exit 1
          fi

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: build/**/*.iso

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
