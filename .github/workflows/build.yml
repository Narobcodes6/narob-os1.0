name: NarobOS ISO Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y \
            live-build debootstrap \
            grub-pc-bin grub-efi-amd64-bin \
            squashfs-tools xorriso \
            dosfstools mtools gnupg

      - name: Prepare config
        run: |
          set -e

          mkdir -p build/config/package-lists
          mkdir -p build/config/includes.chroot/etc
          mkdir -p build/config/hooks/live

          # Fix DNS
          echo "nameserver 8.8.8.8" > build/config/includes.chroot/etc/resolv.conf

          # Force clean Debian sources
          cat << 'EOF' > build/config/includes.chroot/etc/apt/sources.list
          deb http://deb.debian.org/debian bookworm main
          deb http://deb.debian.org/debian-security bookworm-security main
          deb http://deb.debian.org/debian bookworm-updates main
          EOF

          # Minimal working system
          cat << 'EOF' > build/config/package-lists/base.list.chroot
          systemd
          systemd-sysv
          bash
          sudo
          apt
          ca-certificates
          debian-archive-keyring
          live-boot
          live-config
          EOF

          # Force apt update inside chroot (critical fix)
          cat << 'EOF' > build/config/hooks/live/0100-apt-update.chroot
          #!/bin/bash
          set -e
          apt-get update
          EOF

          chmod +x build/config/hooks/live/0100-apt-update.chroot

          cd build

          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --system live \
            --mirror-bootstrap http://deb.debian.org/debian \
            --mirror-chroot http://deb.debian.org/debian \
            --archive-areas "main" \
            --debian-installer none

      - name: Build ISO
        run: |
          set -e
          cd build

          sudo lb clean
          sudo lb build > ../build.log 2>&1

          echo "==== OUTPUT FILES ===="
          ls -lah

          echo "==== ISO SEARCH ===="
          find . -name "*.iso" || true

          if ! find . -name "*.iso" | grep -q .; then
            echo "❌ ISO NOT CREATED"
            tail -n 150 ../build.log
            exit 1
          fi

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: build/**/*.iso

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
