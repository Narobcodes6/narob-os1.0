name: NarobOS ISO Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y \
            live-build debootstrap \
            grub-pc-bin grub-efi-amd64-bin \
            squashfs-tools xorriso \
            dosfstools mtools

      - name: Prepare config
        run: |
          set -e

          mkdir -p build/config/package-lists
          mkdir -p build/config/includes.chroot/etc

          # FIX: working DNS inside chroot (prevents exit 100)
          echo "nameserver 8.8.8.8" > build/config/includes.chroot/etc/resolv.conf

          # REQUIRED packages for actual ISO creation
          cat << 'EOF' > build/config/package-lists/base.list.chroot
          systemd
          systemd-sysv
          bash
          sudo
          apt
          ca-certificates
          debian-archive-keyring
          live-boot
          live-config
          EOF

          cd build

          # IMPORTANT: ensure live ISO is actually built
          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --system live \
            --archive-areas "main" \
            --debian-installer none \
            --iso-volume "NarobOS"

      - name: Build ISO
        run: |
          set -e
          cd build

          sudo lb clean

          # Capture full logs
          sudo lb build > ../build.log 2>&1

          echo "==== BUILD OUTPUT ===="
          ls -lah .

          echo "==== SEARCHING FOR ISO ===="
          find . -name "*.iso" || true

          # HARD FAIL if ISO not created
          if ! find . -name "*.iso" | grep -q .; then
            echo "❌ ISO was NOT created"
            echo "==== LAST 100 LOG LINES ===="
            tail -n 100 ../build.log
            exit 1
          fi

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: |
            build/*.iso
            build/**/*.iso

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
