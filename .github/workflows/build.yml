name: Build NarobOS ISO (Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build debootstrap xorriso squashfs-tools \
            grub-pc-bin grub-efi-amd64-bin mtools dosfstools

      - name: Prepare config
        run: |
          mkdir narobos
          cd narobos

          # Create config script
          mkdir -p auto
          cat > auto/config << 'EOF'
          #!/bin/sh
          set -e

          lb config \
            --mode debian \
            --distribution bookworm \
            --architecture amd64 \
            --binary-images iso-hybrid \
            --debian-installer none \
            --archive-areas "main contrib non-free non-free-firmware" \
            --bootloader grub-efi \
            --apt-recommends false
          EOF

          chmod +x auto/config

          # Minimal package list (safe)
          mkdir -p config/package-lists
          cat > config/package-lists/base.list.chroot << 'EOF'
          systemd
          systemd-sysv
          sudo
          bash
          apt
          debian-archive-keyring
          ca-certificates
          EOF

      - name: Configure
        run: |
          cd narobos
          sudo ./auto/config

      - name: Build ISO
        run: |
          cd narobos
          sudo lb clean
          sudo lb build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: narobos/*.iso
