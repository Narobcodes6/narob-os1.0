name: Build NarobOS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin mtools \
            dosfstools curl

      - name: Bootstrap Debian base
        run: |
          sudo debootstrap \
            --arch=amd64 \
            --variant=minbase \
            --include=systemd,systemd-sysv,dbus,udev,sudo,bash,coreutils,\
          util-linux,procps,curl,wget,ca-certificates,gnupg,\
          pciutils,usbutils,htop,network-manager,wpasupplicant,\
          firmware-linux,firmware-linux-nonfree,firmware-amd-graphics,\
          firmware-iwlwifi,firmware-realtek,\
          xfce4,xfce4-terminal,lightdm,lightdm-gtk-greeter,\
          xorg,xserver-xorg,xserver-xorg-input-libinput,thunar,zenity,\
          synaptic,gdebi,parted,\
          mesa-vulkan-drivers,libvulkan1,libgl1-mesa-dri,\
          pipewire,pipewire-pulse,pipewire-alsa,wireplumber,alsa-utils,\
          fonts-dejavu-core \
            --components=main,contrib,non-free,non-free-firmware \
            bookworm \
            /mnt/narobos \
            http://deb.debian.org/debian

      - name: Configure the system
        run: |
          # Write correct sources.list
          sudo tee /mnt/narobos/etc/apt/sources.list << 'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF

          # OS identity
          sudo tee /mnt/narobos/etc/os-release << 'EOF'
          NAME="NarobOS"
          VERSION="1.0"
          ID=narobos
          ID_LIKE=debian
          PRETTY_NAME="NarobOS 1.0"
          VERSION_ID="1.0"
          EOF

          # Hostname
          echo "narobos" | sudo tee /mnt/narobos/etc/hostname

          # Create live user
          sudo chroot /mnt/narobos useradd -m -s /bin/bash -G sudo,audio,video,plugdev narobos || true
          echo "narobos:narobos" | sudo chroot /mnt/narobos chpasswd
          echo "narobos ALL=(ALL) NOPASSWD:ALL" | sudo tee /mnt/narobos/etc/sudoers.d/narobos

          # LightDM autologin
          sudo mkdir -p /mnt/narobos/etc/lightdm
          sudo tee /mnt/narobos/etc/lightdm/lightdm.conf << 'EOF'
          [Seat:*]
          autologin-user=narobos
          autologin-user-timeout=0
          user-session=xfce
          EOF

          # Enable services
          sudo chroot /mnt/narobos systemctl enable lightdm NetworkManager || true

          # Gaming tweaks
          sudo tee /mnt/narobos/etc/sysctl.d/99-narobos.conf << 'EOF'
          vm.swappiness=10
          fs.inotify.max_user_watches=524288
          EOF

          # MangoHud config
          sudo mkdir -p /mnt/narobos/etc/skel/.config/MangoHud
          sudo tee /mnt/narobos/etc/skel/.config/MangoHud/MangoHud.conf << 'EOF'
          fps
          cpu_stats
          gpu_stats
          gpu_temp
          cpu_temp
          ram
          position=top-left
          font_size=20
          toggle_hud=F12
          EOF

          # Desktop shortcuts
          sudo tee /mnt/narobos/usr/share/applications/narobos-install.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Install NarobOS
          Exec=bash -c 'sudo calamares'
          Icon=system-software-install
          Terminal=false
          Categories=System;
          EOF

          sudo tee /mnt/narobos/usr/share/applications/narobos-packages.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=NarobOS Packages
          Exec=bash -c 'sudo synaptic'
          Icon=synaptic
          Terminal=false
          Categories=System;
          EOF

          # Auto driver installer script
          sudo tee /mnt/narobos/usr/local/bin/narobos-drivers << 'EOF'
          #!/bin/bash
          GPU=$(lspci | grep -iE 'vga|3d|display')
          if echo "$GPU" | grep -qi nvidia; then
            apt-get install -y nvidia-driver
          elif echo "$GPU" | grep -qi amd; then
            apt-get install -y firmware-amd-graphics mesa-vulkan-drivers
          elif echo "$GPU" | grep -qi intel; then
            apt-get install -y intel-media-va-driver mesa-vulkan-drivers
          fi
          WIFI=$(lspci | grep -i network)
          if echo "$WIFI" | grep -qi intel; then apt-get install -y firmware-iwlwifi; fi
          if echo "$WIFI" | grep -qi realtek; then apt-get install -y firmware-realtek; fi
          EOF
          sudo chmod +x /mnt/narobos/usr/local/bin/narobos-drivers

      - name: Build squashfs + ISO
        run: |
          # Make squashfs of the root filesystem
          sudo mkdir -p /mnt/iso/{live,boot/grub}
          sudo mksquashfs /mnt/narobos /mnt/iso/live/filesystem.squashfs \
            -comp xz -e /mnt/narobos/proc -e /mnt/narobos/sys -e /mnt/narobos/dev

          # Copy kernel and initrd
          KERNEL=$(ls /mnt/narobos/boot/vmlinuz-* | tail -1)
          INITRD=$(ls /mnt/narobos/boot/initrd.img-* | tail -1)
          sudo cp $KERNEL /mnt/iso/boot/vmlinuz
          sudo cp $INITRD /mnt/iso/boot/initrd.img

          # GRUB config
          sudo tee /mnt/iso/boot/grub/grub.cfg << 'EOF'
          set default=0
          set timeout=3

          menuentry "NarobOS 1.0 (Live)" {
            linux /boot/vmlinuz boot=live quiet splash
            initrd /boot/initrd.img
          }

          menuentry "NarobOS 1.0 (Safe Mode)" {
            linux /boot/vmlinuz boot=live nomodeset
            initrd /boot/initrd.img
          }
          EOF

          # Build the ISO
          sudo grub-mkrescue -o /tmp/narobos-1.0-amd64.iso /mnt/iso \
            --compress=xz 2>&1

          echo "=== ISO built ==="
          ls -lah /tmp/narobos-1.0-amd64.iso

      - name: Fix permissions
        if: always()
        run: sudo chown runner:runner /tmp/narobos-1.0-amd64.iso 2>/dev/null || true

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: /tmp/narobos-1.0-amd64.iso
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
