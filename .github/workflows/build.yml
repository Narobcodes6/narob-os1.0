name: Build NarobOS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build debootstrap curl gnupg xorriso \
            isolinux syslinux-utils squashfs-tools \
            grub-efi-amd64-bin grub-pc-bin mtools rsync

      - name: Create NarobOS project
        run: |
          mkdir -p narobos/auto/hooks/live
          mkdir -p narobos/config/package-lists
          mkdir -p narobos/config/includes.chroot/{etc/narobos,usr/local/bin,etc/xdg/autostart,usr/share/applications}

          # ------------------------------------------------
          # auto/config
          # ------------------------------------------------
          cat > narobos/auto/config << 'EOF'
          #!/bin/sh
          set -e
          lb config noauto \
            --system live \
            --distribution bookworm \
            --debian-installer none \
            --archive-areas "main contrib non-free non-free-firmware" \
            --apt-recommends false \
            --binary-images iso-hybrid \
            --bootloader grub-efi \
            --memtest none \
            --iso-application "NarobOS" \
            --iso-publisher "NarobOS Project" \
            --iso-volume "NarobOS 1.0" \
            --linux-flavours amd64 \
            --firmware-binary true \
            --firmware-chroot true \
            --mirror-bootstrap "http://deb.debian.org/debian/" \
            --mirror-chroot "http://deb.debian.org/debian/" \
            --mirror-chroot-security "http://security.debian.org/debian-security/" \
            --mirror-binary "http://deb.debian.org/debian/" \
            --mirror-binary-security "http://security.debian.org/debian-security/" \
            "${@}"
          EOF

          # ------------------------------------------------
          # Base packages (Debian only - no Ubuntu packages)
          # ------------------------------------------------
          cat > narobos/config/package-lists/base.list.chroot << 'EOF'
          systemd
          systemd-sysv
          dbus
          udev
          sudo
          bash
          coreutils
          util-linux
          procps
          curl
          wget
          ca-certificates
          gnupg
          firmware-linux
          firmware-linux-nonfree
          firmware-amd-graphics
          firmware-iwlwifi
          firmware-realtek
          mesa-vulkan-drivers
          mesa-va-drivers
          libvulkan1
          libgl1-mesa-dri
          pipewire
          pipewire-pulse
          pipewire-alsa
          wireplumber
          alsa-utils
          pavucontrol
          network-manager
          network-manager-gnome
          wpasupplicant
          fonts-dejavu-core
          fonts-liberation
          fonts-noto-core
          libinput-tools
          ntfs-3g
          exfat-fuse
          dosfstools
          htop
          pciutils
          usbutils
          inxi
          lshw
          unzip
          p7zip-full
          EOF

          # ------------------------------------------------
          # GUI — XFCE desktop
          # ------------------------------------------------
          cat > narobos/config/package-lists/gui.list.chroot << 'EOF'
          xfce4
          xfce4-terminal
          xfce4-taskmanager
          xfce4-screenshooter
          xfce4-power-manager
          xfce4-notifyd
          xfce4-pulseaudio-plugin
          lightdm
          lightdm-gtk-greeter
          xorg
          xserver-xorg
          xserver-xorg-input-libinput
          x11-xserver-utils
          thunar
          thunar-archive-plugin
          mousepad
          file-roller
          gvfs
          gvfs-backends
          zenity
          EOF

          # ------------------------------------------------
          # Gaming packages
          # ------------------------------------------------
          cat > narobos/config/package-lists/gaming.list.chroot << 'EOF'
          gamemode
          mangohud
          ffmpeg
          libavcodec-extra
          vulkan-tools
          mesa-utils
          EOF

          # ------------------------------------------------
          # Calamares installer
          # ------------------------------------------------
          cat > narobos/config/package-lists/installer.list.chroot << 'EOF'
          calamares
          os-prober
          parted
          gparted
          EOF

          # ------------------------------------------------
          # Package manager
          # ------------------------------------------------
          cat > narobos/config/package-lists/pkgmanager.list.chroot << 'EOF'
          synaptic
          gdebi
          flatpak
          EOF

          # ------------------------------------------------
          # Hook: add Steam repo
          # ------------------------------------------------
          cat > narobos/auto/hooks/live/0010-add-repos.hook.chroot << 'EOF'
          #!/bin/bash
          set -e
          dpkg --add-architecture i386
          curl -fsSL https://repo.steampowered.com/steam/archive/precise/steam.gpg \
            -o /usr/share/keyrings/steam.gpg
          cat > /etc/apt/sources.list.d/steam.list << REPO
          deb [arch=amd64,i386 signed-by=/usr/share/keyrings/steam.gpg] https://repo.steampowered.com/steam/ stable steam
          REPO
          apt-get update
          EOF

          # ------------------------------------------------
          # Hook: install Steam
          # ------------------------------------------------
          cat > narobos/auto/hooks/live/0020-steam.hook.chroot << 'EOF'
          #!/bin/bash
          set -e
          DEBIAN_FRONTEND=noninteractive apt-get install -y steam steam-devices || true
          EOF

          # ------------------------------------------------
          # Hook: auto driver installer
          # ------------------------------------------------
          cat > narobos/auto/hooks/live/0030-drivers.hook.chroot << 'EOF'
          #!/bin/bash
          set -e
          cat > /usr/local/bin/narobos-install-drivers << 'DRIVERSCRIPT'
          #!/bin/bash
          exec > >(tee -a /var/log/narobos-drivers.log) 2>&1
          echo "[NarobOS] Detecting hardware..."
          apt-get update -qq
          GPU=$(lspci | grep -iE 'vga|3d|display')
          if echo "$GPU" | grep -qi nvidia; then
            echo "[NarobOS] Nvidia detected — installing driver..."
            apt-get install -y nvidia-driver nvidia-vulkan-icd nvidia-settings
          elif echo "$GPU" | grep -qi amd; then
            echo "[NarobOS] AMD detected — installing driver..."
            apt-get install -y firmware-amd-graphics mesa-vulkan-drivers radeontop
          elif echo "$GPU" | grep -qi intel; then
            echo "[NarobOS] Intel detected — installing driver..."
            apt-get install -y intel-media-va-driver i965-va-driver mesa-vulkan-drivers
          else
            echo "[NarobOS] Generic GPU — installing Mesa..."
            apt-get install -y mesa-vulkan-drivers libvulkan1
          fi
          WIFI=$(lspci | grep -i network)
          if echo "$WIFI" | grep -qi intel; then
            apt-get install -y firmware-iwlwifi
          elif echo "$WIFI" | grep -qi realtek; then
            apt-get install -y firmware-realtek
          elif echo "$WIFI" | grep -qi atheros; then
            apt-get install -y firmware-atheros
          fi
          echo "[NarobOS] Drivers installed."
          zenity --info --title="NarobOS" --text="Drivers installed!\nA restart may be required." 2>/dev/null || true
          rm -f /etc/xdg/autostart/narobos-drivers.desktop
          DRIVERSCRIPT
          chmod +x /usr/local/bin/narobos-install-drivers

          cat > /etc/xdg/autostart/narobos-drivers.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=NarobOS Driver Installer
          Exec=bash -c 'pkexec /usr/local/bin/narobos-install-drivers'
          Icon=system-software-install
          X-GNOME-Autostart-enabled=true
          DESKTOP
          EOF

          # ------------------------------------------------
          # Hook: gaming tweaks
          # ------------------------------------------------
          cat > narobos/auto/hooks/live/0040-gaming-tweaks.hook.chroot << 'EOF'
          #!/bin/bash
          set -e
          cat > /etc/sysctl.d/99-narobos-gaming.conf << SYSCTL
          vm.swappiness=10
          vm.dirty_ratio=10
          fs.inotify.max_user_watches=524288
          net.core.netdev_max_backlog=16384
          SYSCTL

          cat > /etc/gamemode.ini << GAMEMODE
          [general]
          renice=10
          ioprio=0
          [gpu]
          apply_gpu_optimisations=accept-responsibility
          gpu_device=0
          amd_performance_level=high
          GAMEMODE

          mkdir -p /etc/skel/.config/MangoHud
          cat > /etc/skel/.config/MangoHud/MangoHud.conf << MANGO
          fps
          frametime
          cpu_stats
          gpu_stats
          gpu_temp
          cpu_temp
          ram
          vram
          position=top-left
          font_size=20
          toggle_hud=F12
          MANGO
          EOF

          # ------------------------------------------------
          # Hook: LightDM autologin + live user
          # ------------------------------------------------
          cat > narobos/auto/hooks/live/0050-lightdm.hook.chroot << 'EOF'
          #!/bin/bash
          set -e
          useradd -m -s /bin/bash -G sudo,audio,video,plugdev,netdev narobos || true
          echo "narobos:narobos" | chpasswd
          echo "narobos ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/narobos
          mkdir -p /etc/lightdm
          cat > /etc/lightdm/lightdm.conf << LDM
          [Seat:*]
          autologin-user=narobos
          autologin-user-timeout=0
          user-session=xfce
          LDM
          systemctl enable lightdm || true
          EOF

          # ------------------------------------------------
          # Hook: desktop shortcuts + welcome
          # ------------------------------------------------
          cat > narobos/auto/hooks/live/0060-desktop.hook.chroot << 'EOF'
          #!/bin/bash
          set -e
          cat > /usr/local/bin/narobos-welcome << 'WELCOME'
          #!/bin/bash
          zenity --info \
            --title="Welcome to NarobOS" \
            --width=420 \
            --text="<b>Welcome to NarobOS 1.0</b>\n\nYour lightweight gaming Linux distro.\n\n• <b>Install to disk:</b> Click Install NarobOS on the desktop\n• <b>Gaming:</b> Open Steam from the applications menu\n• <b>Drivers:</b> Being installed automatically in the background\n• <b>Packages:</b> Use Synaptic or Flatpak\n\nEnjoy!" \
            --ok-label="Let's Go" 2>/dev/null || true
          WELCOME
          chmod +x /usr/local/bin/narobos-welcome

          cat > /etc/xdg/autostart/narobos-welcome.desktop << DESK
          [Desktop Entry]
          Type=Application
          Name=NarobOS Welcome
          Exec=/usr/local/bin/narobos-welcome
          Icon=distributor-logo
          X-GNOME-Autostart-enabled=true
          DESK

          cat > /usr/share/applications/install-narobos.desktop << DESK
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Install NarobOS
          Comment=Install NarobOS to your hard drive
          Exec=calamares
          Icon=calamares
          Terminal=false
          Categories=System;
          DESK

          cat > /usr/share/applications/narobos-packages.desktop << DESK
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=NarobOS Package Manager
          Comment=Install and manage software
          Exec=synaptic
          Icon=synaptic
          Terminal=false
          Categories=System;PackageManager;
          DESK
          EOF

          # ------------------------------------------------
          # OS identity
          # ------------------------------------------------
          cat > narobos/config/includes.chroot/etc/os-release << 'EOF'
          NAME="NarobOS"
          VERSION="1.0"
          ID=narobos
          ID_LIKE=debian
          PRETTY_NAME="NarobOS 1.0"
          VERSION_ID="1.0"
          EOF

          chmod +x narobos/auto/config
          chmod +x narobos/auto/hooks/live/*.hook.chroot
          echo "Project structure:"
          find narobos -type f | sort

      - name: Configure live-build
        working-directory: narobos
        run: sudo bash auto/config

      - name: Build ISO
        working-directory: narobos
        run: sudo lb build 2>&1 | tee ../build.log

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: "narobos/*.iso"
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
