name: Build NarobOS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build debootstrap curl gnupg xorriso \
            isolinux syslinux-utils squashfs-tools \
            grub-efi-amd64-bin grub-pc-bin \
            mtools rsync ca-certificates

      - name: Create NarobOS live-build config
        run: |
          mkdir -p narobos/{auto/hooks/live,config/package-lists,config/includes.chroot/etc/narobos}

          # -----------------------
          # live-build config
          # -----------------------
          cat > narobos/auto/config << 'EOF'
          #!/bin/sh
          set -e

          lb config noauto \
            --mode debian \
            --system live \
            --distribution bookworm \
            --debian-installer none \
            --archive-areas "main contrib non-free non-free-firmware" \
            --binary-images iso-hybrid \
            --bootloader grub-efi \
            --firmware-binary true \
            --firmware-chroot true \
            --apt-recommends false \
            --memtest none \
            --iso-application "NarobOS" \
            --iso-volume "NarobOS 1.0" \
            --image-name "narobos-1.0-amd64" \
            --mirror-bootstrap http://deb.debian.org/debian/ \
            --mirror-chroot http://deb.debian.org/debian/ \
            "${@}"
          EOF

          chmod +x narobos/auto/config

          # -----------------------
          # Base system packages
          # -----------------------
          cat > narobos/config/package-lists/base.list.chroot << 'EOF'
          systemd
          systemd-sysv
          dbus
          udev
          sudo
          bash
          coreutils
          util-linux
          procps
          curl
          wget
          ca-certificates
          gnupg
          apt
          debian-archive-keyring
          firmware-linux
          firmware-linux-nonfree
          firmware-amd-graphics
          firmware-iwlwifi
          firmware-realtek
          mesa-vulkan-drivers
          mesa-va-drivers
          libvulkan1
          libgl1-mesa-dri
          pipewire
          pipewire-pulse
          pipewire-alsa
          wireplumber
          alsa-utils
          network-manager
          wpasupplicant
          fonts-dejavu-core
          fonts-liberation
          ntfs-3g
          htop
          pciutils
          usbutils
          EOF

          # -----------------------
          # Gaming packages
          # -----------------------
          cat > narobos/config/package-lists/gaming.list.chroot << 'EOF'
          gamemode
          mangohud
          ffmpeg
          libavcodec-extra
          EOF

          # -----------------------
          # Steam repo (Debian-safe)
          # -----------------------
          cat > narobos/auto/hooks/live/0010-steam.hook.chroot << 'EOF'
          #!/bin/bash
          set -e

          dpkg --add-architecture i386

          mkdir -p /usr/share/keyrings

          curl -fsSL https://repo.steampowered.com/steam/archive/precise/steam.gpg \
            | gpg --dearmor -o /usr/share/keyrings/steam.gpg

          echo "deb [arch=amd64,i386 signed-by=/usr/share/keyrings/steam.gpg] https://repo.steampowered.com/steam stable steam" \
            > /etc/apt/sources.list.d/steam.list

          apt-get update
          EOF

          chmod +x narobos/auto/hooks/live/0010-steam.hook.chroot

          # -----------------------
          # Performance tweaks
          # -----------------------
          cat > narobos/auto/hooks/live/0030-performance.hook.chroot << 'EOF'
          #!/bin/bash
          set -e

          cat > /etc/sysctl.d/99-narobos.conf << SYSCTL
          vm.swappiness=10
          vm.dirty_ratio=10
          fs.inotify.max_user_watches=524288
          SYSCTL
          EOF

          chmod +x narobos/auto/hooks/live/0030-performance.hook.chroot

          # -----------------------
          # OS branding
          # -----------------------
          cat > narobos/config/includes.chroot/etc/narobos/os-release << 'EOF'
          NAME="NarobOS"
          VERSION="1.0"
          ID=narobos
          ID_LIKE=debian
          PRETTY_NAME="NarobOS 1.0"
          VERSION_ID="1.0"
          EOF

      - name: Configure live-build
        working-directory: narobos
        run: sudo ./auto/config

      - name: Build ISO
        working-directory: narobos
        run: sudo lb build | tee ../build.log

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: narobos/*.iso

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
