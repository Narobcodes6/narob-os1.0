name: NarobOS ISO Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y \
            live-build debootstrap \
            grub-pc-bin grub-efi-amd64-bin \
            squashfs-tools xorriso \
            dosfstools mtools

      - name: Configure build
        run: |
          set -e

          mkdir -p build/config/package-lists

          cat << 'EOF' > build/config/package-lists/base.list.chroot
          systemd
          systemd-sysv
          bash
          sudo
          apt
          ca-certificates
          debian-archive-keyring
          live-boot
          live-config
          EOF

          cd build

          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --system live \
            --archive-areas "main" \
            --debian-installer none

      - name: Build ISO (strict)
        run: |
          set -e
          cd build

          sudo lb clean

          # FORCE LOG + FAIL IF ANYTHING BREAKS
          sudo lb build > ../build.log 2>&1

          # FAIL if ISO not created
          if ! ls *.iso 1> /dev/null 2>&1; then
            echo "❌ ISO was NOT created"
            echo "===== LAST LOG OUTPUT ====="
            tail -n 100 ../build.log
            exit 1
          fi

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: narobos-iso
          path: build/*.iso

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
