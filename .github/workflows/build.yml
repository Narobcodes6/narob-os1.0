- name: Find and move files if nested
        run: |
          if [ ! -f build.sh ]; then
            BUILDSH=$(find . -name "build.sh" | head -1)
            SRCDIR=$(dirname "$BUILDSH")
            echo "Found build.sh at: $BUILDSH, moving from $SRCDIR"
            cp -r "$SRCDIR"/. .
          fi
          ls -la
